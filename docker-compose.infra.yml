services:
    # --------------------------------------------------------
    # SPARK-ICEBERG
    # --------------------------------------------------------\

  spark-iceberg:
    container_name: spark-iceberg_b
    image: ${ECR_REGISTRY:-ecommerce-local}/spark:latest
    build:
      context: .
      dockerfile: spark/Dockerfile.spark
    networks:
      - data-network
    depends_on:
      - postgres-catalog
      - minio
    volumes:
      #- ./data/warehouse:/home/iceberg/warehouse
      #- ./src/data_pipeline/notebooks:/home/iceberg/notebooks/notebooks
      - ./src/data_pipeline/notebooks:/opt/workspace/src/data_pipeline/notebooks
      #- ./data-lake:/home/iceberg/datalake
    environment:
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_REGION=${AWS_REGION}
      - CATALOG_WAREHOUSE=s3a://warehouse/
      - CATALOG_IO__IMPL=org.apache.iceberg.aws.s3.S3FileIO
      - CATALOG_S3_ENDPOINT=http://minio:9000
      - CATALOG_S3_PATH_STYLE_ACCESS=true
      - spark.sql.defaultCatalog=lakehouse
      # Spark performance tuning — override without rebuilding image
      - SPARK_EXECUTOR_MEMORY=2g        # RAM per executor (increase for large joins)
      - SPARK_DRIVER_MEMORY=1g          # RAM for driver process
      - SPARK_SHUFFLE_PARTITIONS=8      # dev=8 keeps jobs fast; prod set to 200
      - SPARK_BROADCAST_THRESHOLD=52428800  # 50MB: tables smaller than this → broadcast join
    ports:
      - 8888:8888
      - 8082:8080
      #- 10000:10000
      #- 10001:10001

  spark-thrift:
    image: ${ECR_REGISTRY:-ecommerce-local}/spark:latest
    build:
      context: .
      dockerfile: spark/Dockerfile.spark
    container_name: spark-dbt-thrift
    ports:
      - "10000:10000"
      - "4040:4040"
    networks:
      - data-network
    volumes:
      - ./src:/opt/workspace/src
      - ./spark/conf/spark-defaults.conf:/opt/spark/conf/spark-defaults.conf
    environment:
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_REGION=${AWS_REGION}
      - CATALOG_WAREHOUSE=${CATALOG_WAREHOUSE:-s3a://warehouse/}
      - CATALOG_IO__IMPL=org.apache.iceberg.aws.s3.S3FileIO
      - CATALOG_S3_PATH_STYLE_ACCESS=true
      - spark.sql.defaultCatalog=lakehouse
      # spark-defaults.conf (baked vào image) hardcode postgres-catalog/minio cho
      # local dev — override qua --conf command-line (ưu tiên cao hơn file) để
      # dùng đúng RDS + S3 thật trên AWS. Default = giữ nguyên giá trị cũ, không
      # đổi behavior local dev khi không set qua --env-file .env.aws.
      - POSTGRES_ICEBERG_HOST=${POSTGRES_ICEBERG_HOST:-postgres-catalog}
      - POSTGRES_ICEBERG_PORT=${POSTGRES_ICEBERG_PORT:-5432}
      - POSTGRES_ICEBERG_USER=${POSTGRES_ICEBERG_USER:-admin}
      - POSTGRES_ICEBERG_PASSWORD=${POSTGRES_ICEBERG_PASSWORD:-password}
      - POSTGRES_ICEBERG_DB=${POSTGRES_ICEBERG_DB:-iceberg_metadata}
      - S3A_ENDPOINT=${S3A_ENDPOINT:-http://minio:9000}
      - ICEBERG_S3_ENDPOINT=${ICEBERG_S3_ENDPOINT:-http://minio:9000}
      - S3_CREDENTIALS_PROVIDER=${S3_CREDENTIALS_PROVIDER:-org.apache.hadoop.fs.s3a.SimpleAWSCredentialsProvider}
    command: >
      bash -c "/opt/spark/sbin/start-thriftserver.sh
      --packages org.apache.iceberg:iceberg-spark-runtime-3.4_2.12:1.4.3,org.apache.iceberg:iceberg-aws-bundle:1.4.3
      --conf spark.sql.catalog.lakehouse.uri=jdbc:postgresql://\$POSTGRES_ICEBERG_HOST:\$POSTGRES_ICEBERG_PORT/\$POSTGRES_ICEBERG_DB
      --conf spark.sql.catalog.lakehouse.jdbc.user=\$POSTGRES_ICEBERG_USER
      --conf spark.sql.catalog.lakehouse.jdbc.password=\$POSTGRES_ICEBERG_PASSWORD
      --conf spark.sql.catalog.lakehouse.warehouse=\$CATALOG_WAREHOUSE
      --conf spark.sql.catalog.lakehouse.s3.endpoint=\$ICEBERG_S3_ENDPOINT
      --conf spark.hadoop.fs.s3a.endpoint=\$S3A_ENDPOINT
      --conf spark.hadoop.fs.s3a.aws.credentials.provider=\$S3_CREDENTIALS_PROVIDER
      --conf spark.hadoop.fs.s3a.access.key=\${AWS_ACCESS_KEY_ID:-admin}
      --conf spark.hadoop.fs.s3a.secret.key=\${AWS_SECRET_ACCESS_KEY:-password}
      && tail -f /opt/spark/logs/*"
    restart: unless-stopped

  postgres-catalog:
    image: postgres:15
    container_name: postgres-catalog
    environment:
      - POSTGRES_USER=${POSTGRES_ICEBERG_USER}
      - POSTGRES_PASSWORD=${POSTGRES_ICEBERG_PASSWORD}
      - POSTGRES_DB=${POSTGRES_ICEBERG_DB}
    ports:
      - "5432:5432"
    networks:
      - data-network
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin
    profiles: ["dev"]
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@example.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin}
    ports:
      - "5050:80"  # Truy cập giao diện web pgAdmin qua port 5050
    networks:
      - data-network
    depends_on:
      - postgres-catalog

    # --------------------------------------------------------
    # MINIO - S3
    # --------------------------------------------------------\

  minio:
    image: minio/minio
    container_name: minio_b
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
      - MINIO_DOMAIN=minio
      # Webhook notification: fires POST to agent-api when file uploaded to kb-docs/
      # agent-api then triggers Airflow DAG kb_reindex_pipeline (or direct reindex)
      - MINIO_NOTIFY_WEBHOOK_ENABLE_1=on
      - MINIO_NOTIFY_WEBHOOK_ENDPOINT_1=http://agent-api:8003/admin/kb/reindex-webhook
      # /admin/* giờ yêu cầu auth. MinIO gửi token qua header
      # Authorization; agent-api chấp nhận cả header này lẫn X-API-Key.
      - MINIO_NOTIFY_WEBHOOK_AUTH_TOKEN_1=${ADMIN_API_KEY:?ADMIN_API_KEY chưa được set}
    volumes:
      - ./data/warehouse:/data
    networks:
      data-network:
        aliases:
          - warehouse.minio
    ports:
      - 9001:9001
      - 9000:9000
    command: ["server", "/data", "--console-address", ":9001"]
  mc:
    depends_on:
      - minio
    image: minio/mc
    container_name: mc_b
    networks:
      - data-network
    environment:
      - AWS_ACCESS_KEY_ID=${MINIO_ROOT_USER}
      - AWS_SECRET_ACCESS_KEY=${MINIO_ROOT_PASSWORD}
      - AWS_REGION=us-east-1
    entrypoint: |
      /bin/sh -c "
      until (/usr/bin/mc alias set minio http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD}) do echo '...waiting...' && sleep 1; done;
      /usr/bin/mc mb --ignore-existing minio/warehouse;
      /usr/bin/mc policy set public minio/warehouse;
      /usr/bin/mc event add minio/warehouse arn:minio:sqs::1:webhook --event put --prefix kb-docs/ || true;
      tail -f /dev/null
      "
    # --------------------------------------------------------
    # 1. KAFKA (KRAFT MODE) - STREAMING
    # --------------------------------------------------------\
  broker:
    image: confluentinc/cp-kafka:8.2.0
    hostname: broker
    container_name: recsys_broker
    ports:
      - "9092:9092"
      - "9101:9101"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://broker:29092,PLAINTEXT_HOST://localhost:9092'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_JMX_PORT: 9101
      KAFKA_JMX_HOSTNAME: localhost
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@broker:29093'
      KAFKA_LISTENERS: 'PLAINTEXT://broker:29092,CONTROLLER://broker:29093,PLAINTEXT_HOST://0.0.0.0:9092'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_LOG_DIRS: '/tmp/kraft-combined-logs'
      # Replace CLUSTER_ID with a unique base64 UUID using "bin/kafka-storage.sh random-uuid"
      # See https://docs.confluent.io/kafka/operations-tools/kafka-tools.html#kafka-storage-sh
      CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qk'
    volumes:
      - ./kafka-data:/tmp/kraft-combined-logs
    restart: unless-stopped
    networks:
      - data-network

  schema-registry:
    image: confluentinc/cp-schema-registry:8.2.0
    hostname: schema-registry
    container_name: recsys_schema_registry
    depends_on:
      - broker
    ports:
      - "8081:8081"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: 'broker:29092'
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
    restart: unless-stopped
    networks:
      - data-network

  connect:
    image: confluentinc/cp-kafka-connect:8.2.0
    hostname: connect
    container_name: recsys_connect
    depends_on:
      - broker
      - schema-registry
    ports:
      - "8083:8083"
    environment:
      CONNECT_BOOTSTRAP_SERVERS: 'broker:29092'
      CONNECT_REST_ADVERTISED_HOST_NAME: connect
      CONNECT_REST_PORT: 8083
      CONNECT_GROUP_ID: compose-connect-group
      CONNECT_CONFIG_STORAGE_TOPIC: docker-connect-configs
      CONNECT_CONFIG_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_OFFSET_FLUSH_INTERVAL_MS: 10000
      CONNECT_OFFSET_STORAGE_TOPIC: docker-connect-offsets
      CONNECT_OFFSET_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_STATUS_STORAGE_TOPIC: docker-connect-status
      CONNECT_STATUS_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_KEY_CONVERTER: org.apache.kafka.connect.storage.StringConverter
      CONNECT_VALUE_CONVERTER: io.confluent.connect.avro.AvroConverter
      CONNECT_VALUE_CONVERTER_SCHEMA_REGISTRY_URL: http://schema-registry:8081
      CONNECT_PLUGIN_PATH: "/usr/share/java,/usr/share/confluent-hub-components"
    command:
      - bash
      - -c
      - |
        echo "Đang cài đặt S3 Sink Connector cho MinIO..."
        confluent-hub install --no-prompt confluentinc/kafka-connect-s3:latest
        echo "Khởi động Kafka Connect..."
        /etc/confluent/docker/run
    networks:
      - data-network

    # --------------------------------------------------------
    # 2. KAFKA CLUSTER (EC2 deploy) — 3-broker KRaft
    # Local dev: use single 'broker' above (no profile needed)
    # EC2 deploy: docker compose --profile cluster up
    #             Set KAFKA_BOOTSTRAP_SERVERS=kafka-1:9092,kafka-2:9092,kafka-3:9092
    # --------------------------------------------------------

  kafka-1:
    image: confluentinc/cp-kafka:8.2.0
    hostname: kafka-1
    container_name: recsys_kafka_1
    profiles: [cluster]
    ports:
      - "19092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka-1:29093,2@kafka-2:29093,3@kafka-3:29093
      KAFKA_LISTENERS: PLAINTEXT://kafka-1:29092,CONTROLLER://kafka-1:29093,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-1:29092,PLAINTEXT_HOST://kafka-1:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 2
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 2
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
      KAFKA_MIN_INSYNC_REPLICAS: 2
      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs
      CLUSTER_ID: KRaft3BrokerCluster001
    volumes:
      - kafka-cluster-1:/tmp/kraft-combined-logs
    networks:
      - data-network

  kafka-2:
    image: confluentinc/cp-kafka:8.2.0
    hostname: kafka-2
    container_name: recsys_kafka_2
    profiles: [cluster]
    ports:
      - "29092:9092"
    environment:
      KAFKA_NODE_ID: 2
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka-1:29093,2@kafka-2:29093,3@kafka-3:29093
      KAFKA_LISTENERS: PLAINTEXT://kafka-2:29092,CONTROLLER://kafka-2:29093,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-2:29092,PLAINTEXT_HOST://kafka-2:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 2
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 2
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
      KAFKA_MIN_INSYNC_REPLICAS: 2
      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs
      CLUSTER_ID: KRaft3BrokerCluster001
    volumes:
      - kafka-cluster-2:/tmp/kraft-combined-logs
    networks:
      - data-network

  kafka-3:
    image: confluentinc/cp-kafka:8.2.0
    hostname: kafka-3
    container_name: recsys_kafka_3
    profiles: [cluster]
    ports:
      - "39092:9092"
    environment:
      KAFKA_NODE_ID: 3
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka-1:29093,2@kafka-2:29093,3@kafka-3:29093
      KAFKA_LISTENERS: PLAINTEXT://kafka-3:29092,CONTROLLER://kafka-3:29093,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-3:29092,PLAINTEXT_HOST://kafka-3:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 2
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 2
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
      KAFKA_MIN_INSYNC_REPLICAS: 2
      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs
      CLUSTER_ID: KRaft3BrokerCluster001
    volumes:
      - kafka-cluster-3:/tmp/kraft-combined-logs
    networks:
      - data-network

    # --------------------------------------------------------
    # 4. REDIS - FEATURE STORE
    # --------------------------------------------------------

  redis:
    # redis-stack-server = Redis + RediSearch. LangGraph RedisSaver (checkpointer
    # của agent) đánh index checkpoint qua lệnh FT.*
    # Là superset của Redis: Feast (db1), memory (db2), rate-limit + cost guard
    image: redis/redis-stack-server:7.2.0-v11
    container_name: recsys_redis
    environment:
      REDIS_ARGS: >-
        --requirepass ${REDIS_PASSWORD}
        --appendonly yes
        --appendfsync everysec
        --save 900 1
        --save 300 10
        --save 60 10000
        --maxmemory 512mb
        --maxmemory-policy allkeys-lru
    ports:
    - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped
    networks:
      - data-network

    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5


    # --------------------------------------------------------
    # QDRANT - VECTOR DATABASE
    # Replaces Milvus (lighter: 200MB vs 500MB+, no etcd/MinIO deps)
    # Switch: VECTOR_STORE_BACKEND=qdrant | faiss
    # --------------------------------------------------------

  qdrant:
    image: qdrant/qdrant:v1.12.4
    container_name: recsys_qdrant
    ports:
      - "6333:6333"   # REST + gRPC
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__HTTP_PORT: 6333
      QDRANT__SERVICE__GRPC_PORT: 6334
    restart: unless-stopped
    networks:
      - data-network

    # --------------------------------------------------------
    # METABASE - BI
    # --------------------------------------------------------\

  metabase:
    image: metabase/metabase:latest
    container_name: metabase
    ports:
      - "3000:3000"
    environment:
      - MB_DB_TYPE=postgres
      - MB_DB_DBNAME=${MB_DB_NAME}
      - MB_DB_PORT=${MB_DB_PORT}
      - MB_DB_USER=${MB_DB_USER}
      - MB_DB_PASS=${MB_DB_PASS}
      - MB_DB_HOST=${MB_DB_HOST}
    networks:
      - data-network

volumes:
  kafka-data:
  kafka-cluster-1:
  kafka-cluster-2:
  kafka-cluster-3:
  redis-data:
  qdrant_data:

networks:
  data-network:
    external: true
    name: my_shared_network
