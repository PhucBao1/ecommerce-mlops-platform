upstream recsys_backend {
    # Round-robin — 2 replica recsys-api-gpu ở Phase 2 (benchmark GPU horizontal
    # scaling 16/7/2026) — IP private cố định vì cùng subnet Phase 1, không
    # đổi khi replica restart (chỉ đổi khi terraform apply lại tạo mới instance).
    server 10.0.1.115:8001 max_fails=2 fail_timeout=10s;
    server 10.0.1.71:8001 max_fails=2 fail_timeout=10s;
}

server {
    listen 8090;

    proxy_connect_timeout 5s;
    proxy_read_timeout 30s;
    proxy_send_timeout 30s;

    location / {
        proxy_pass http://recsys_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        # $proxy_add_x_forwarded_for (NỐI thêm), không dùng $remote_addr (GHI ĐÈ)
        # — bug thật gặp phải: $remote_addr xoá mất X-Forwarded-For giả lập theo
        # từng user của loadtest_recsys.py, khiến mọi user qua LB bị tính chung
        # 1 bucket rate-limit (429 hàng loạt, 16/7/2026).
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
