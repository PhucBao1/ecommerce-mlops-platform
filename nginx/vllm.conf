upstream vllm_backend {
    # Round-robin mặc định — 2 replica GPU Spot ở Phase 2 (terraform/phase2/vllm.tf)
    # IP private lấy từ `terraform output vllm_replica_private_ips`, cố định vì
    # cùng subnet Phase 1, không đổi khi replica restart (khác public IP).
    server 10.0.1.101:8000 max_fails=2 fail_timeout=10s;
    # IP cũ (10.0.1.115/10.0.1.71) mất khi terraform apply lại replica 18/7 —
    # private IP đổi mỗi lần replica bị tạo lại (destroy+create, không phải
    # restart), cập nhật lại theo `terraform output vllm_replica_private_ips`.
    server 10.0.1.11:8000 max_fails=2 fail_timeout=10s;
}

server {
    listen 8080;

    # vLLM cold-start (load model 7B từ EBS) đo được ~12-13 phút, và 1 request
    # sinh câu trả lời có thể mất hàng chục giây — timeout dài hơn nhiều so với
    # proxy mặc định (60s) để không cắt ngang request hợp lệ.
    proxy_connect_timeout 10s;
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;

    location / {
        proxy_pass http://vllm_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }
}
