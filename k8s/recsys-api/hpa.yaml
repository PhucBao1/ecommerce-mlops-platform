apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: recsys-api-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: recsys-api
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Pods
      pods:
        metric:
          # Custom metric from Prometheus adapter — scale on actual request rate
          # not just CPU, which may lag behind traffic spikes
          name: http_requests_per_second
        target:
          type: AverageValue
          averageValue: "100"
