repos:
  # Basic file checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-merge-conflict
      - id: detect-private-key

  # Import sorting
  #- repo: https://github.com/PyCQA/isort
   # rev: 5.13.2
   # hooks:
    #  - id: isort
     #   args: ["--profile", "black"]

  # Formatting
  - repo: https://github.com/psf/black
    rev: 24.4.2
    hooks:
      - id: black

  # Linting & Import Sorting (Giao hết cho Ruff đảm nhận)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.5.0
    hooks:
      - id: ruff
        # --fix: tự sửa lỗi linter, --select I: tự động sắp xếp import giống isort
        args: ["--fix", "--select", "I", "--exit-zero"]

  # Type checking — disabled locally, runs in CI only
  # - repo: https://github.com/pre-commit/mirrors-mypy
  #   rev: v1.10.0
  #   hooks:
  #     - id: mypy

  # Notebook cleanup
  - repo: https://github.com/kynan/nbstripout
    rev: 0.7.1
    hooks:
      - id: nbstripout

  # Secrets scanning
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.2
    hooks:
      - id: gitleaks

  # Dockerfile linting
  # Dockerfile lint — disabled locally, runs in CI only
  # - repo: https://github.com/hadolint/hadolint
  #   rev: v2.12.0
  #   hooks:
  #     - id: hadolint
  #       args: [--config, .hadolint.yaml]

  # Terraform formatting and validation
  - repo: https://github.com/antonbabenko/pre-commit-terraform
    rev: v1.92.0
    hooks:
      - id: terraform_fmt
      - id: terraform_validate

  # SQL linting and formatting — disabled locally, runs in CI only
  # - repo: https://github.com/sqlfluff/sqlfluff
  #   rev: 3.0.5
  #   hooks:
  #     - id: sqlfluff-lint
  #     - id: sqlfluff-fix
